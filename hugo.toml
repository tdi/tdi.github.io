baseURL = 'https://blog.dwornikowski.com/'
languageCode = 'en-us'
title = "Darek's Blog"
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "Darek's Blog"
description = "Notes on AI transformation, agentic coding, engineering leadership, and building Bitropy — by Dariusz Dwornikowski."
keywords = ["AI transformation", "agentic coding", "CTO", "engineering leadership", "MCP", "Bitropy", "LLMs", "platform engineering"]
author = "Dariusz Dwornikowski"
images = ["/openg.png"]
DateFormat = "January 2, 2006"
defaultTheme = "auto"          # dark, light
disableThemeToggle = false

ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = false
tocopen = false

[params.assets]
# disableHLJS = true # to disable highlight.js
# disableFingerprinting = true

[params.label]
text = "Darek's Blog"

# profile-mode
[params.profileMode]
enabled = false
title = "Darek Dwornikowski"
subtitle = "Engineering leader, founder of Bitropy, writing about AI transformation and agentic coding."
imageWidth = 120
imageHeight = 120
imageTitle = "Darek Dwornikowski"
buttons = [{ name = "Posts", url = "/posts" }, { name = "Tags", url = "/tags" }]

# home-info mode
[params.homeInfoParams]
Title = "Hi, I'm Darek"
Content = "I'm an engineering leader and founder of [Bitropy](https://bitropy.io). Here I write about AI transformation, agentic coding, and lessons from 20+ years scaling tech companies. More about me at [dwornikowski.com](https://dwornikowski.com)."

[[params.socialIcons]]
name = "x"
url = "https://x.com/darek_dwo"

[[params.socialIcons]]
name = "github"
url = "https://github.com/tdi"

[[params.socialIcons]]
name = "linkedin"
url = "https://linkedin.com/in/darekd"

[[params.socialIcons]]
name = "link"
url = "https://dwornikowski.com"

[params.cover]
hidden = true
hiddenInList = true
hiddenInSingle = true
image = "/openg.png"

[params.editPost]
URL = "https://github.com/tdi/tdi.github.io/tree/main/content"
Text = "Suggest Changes"                                       # edit text
appendFilePath = true                                          # to append file path to Edit link

# for search
# https://fusejs.io/api/options.html
[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 10


[[menu.main]]
identifier = "categories"
name = "categories"
url = "/categories/"
weight = 10

[[menu.main]]
identifier = "tags"
name = "tags"
url = "/tags/"
weight = 20

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses = true
[markup]
[markup.highlight]
noClasses = false
# anchorLineNos = true
# codeFences = true
# guessSyntax = true
# lineNos = true
# style = "github"
[caches]
[caches.images]
dir = ':cacheDir/images'
